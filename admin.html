<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - N&A Transporte GmbH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-neutral-50 text-neutral-900 min-h-screen">
    <header class="bg-white border-b border-neutral-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold tracking-tight">Admin Panel</h1>
            <a href="/" class="text-neutral-500 hover:text-black font-medium transition-colors">Zurück zur Website</a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="bg-white rounded-2xl border border-neutral-200 overflow-hidden shadow-sm">
            <div class="px-8 py-6 border-b border-neutral-200 flex flex-col md:flex-row justify-between items-center gap-4 bg-neutral-50/50">
                <h3 class="text-xl font-bold text-neutral-900 tracking-tight">Eingegangene Anfragen</h3>
                <button onclick="fetchSubmissions()" class="flex items-center gap-2 text-sm font-medium bg-black text-white px-4 py-2 rounded-lg hover:bg-neutral-800 transition-colors shadow-sm">
                    <span class="material-symbols-outlined text-[18px]">refresh</span> Aktualisieren
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-neutral-200">
                    <thead class="bg-neutral-50">
                        <tr>
                            <th scope="col" class="px-8 py-4 text-left text-xs font-semibold text-neutral-500 uppercase tracking-widest">Datum</th>
                            <th scope="col" class="px-8 py-4 text-left text-xs font-semibold text-neutral-500 uppercase tracking-widest">Name</th>
                            <th scope="col" class="px-8 py-4 text-left text-xs font-semibold text-neutral-500 uppercase tracking-widest">Kontakt</th>
                            <th scope="col" class="px-8 py-4 text-left text-xs font-semibold text-neutral-500 uppercase tracking-widest">Fahrzeug</th>
                            <th scope="col" class="px-8 py-4 text-left text-xs font-semibold text-neutral-500 uppercase tracking-widest">Nachricht</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="bg-white divide-y divide-neutral-100">
                        <!-- Rows will be populated by JS -->
                        <tr>
                            <td colspan="5" class="px-8 py-8 text-center text-sm text-neutral-500">Daten werden geladen...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        async function fetchSubmissions() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '<tr><td colspan="5" class="px-8 py-8 text-center text-sm text-neutral-500">Daten werden geladen...</td></tr>';
            
            try {
                const res = await fetch('/api/submissions');
                if (res.status === 401) {
                    window.location.href = '/admin';
                    return;
                }
                if (!res.ok) throw new Error('Failed to fetch');
                const data = await res.json();
                
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="px-8 py-8 text-center text-sm text-neutral-500 font-medium">Keine Anfragen gefunden.</td></tr>';
                    return;
                }

                tbody.innerHTML = data.map(sub => `
                    <tr class="hover:bg-neutral-50 transition-colors">
                        <td class="px-8 py-5 whitespace-nowrap text-sm text-neutral-500">${new Date(sub.created_at).toLocaleString('de-DE')}</td>
                        <td class="px-8 py-5 whitespace-nowrap text-sm font-semibold text-neutral-900">${escapeHtml(sub.name)}</td>
                        <td class="px-8 py-5 whitespace-nowrap text-sm text-neutral-500">
                            <div class="text-neutral-900 font-medium">${escapeHtml(sub.email)}</div>
                            <div class="mt-1">${escapeHtml(sub.phone)}</div>
                        </td>
                        <td class="px-8 py-5 whitespace-nowrap text-sm text-neutral-600">${escapeHtml(sub.vehicle || '-')}</td>
                        <td class="px-8 py-5 text-sm text-neutral-600 max-w-xs truncate" title="${escapeHtml(sub.message || '')}">${escapeHtml(sub.message || '-')}</td>
                    </tr>
                `).join('');
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-8 py-8 text-center text-sm text-red-500 font-medium">Fehler beim Laden der Daten.</td></tr>';
                console.error(err);
            }
        }

        function escapeHtml(unsafe) {
            return (unsafe || '').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // Load data on start
        fetchSubmissions();
    </script>
</body>
</html>
